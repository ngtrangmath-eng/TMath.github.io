<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{TITLE}}</title>
  <script src="../../assets/mathjax-loader.js" defer></script>
  <style>
    :root {
      --bg: #f7f5ef;
      --surface: #ffffff;
      --ink: #21312b;
      --muted: #61706a;
      --line: #d9ded7;
      --primary: #216e6a;
      --primary-dark: #164f4c;
      --accent: #b04f2d;
      --soft-green: #e5f2ee;
      --soft-amber: #fff2d7;
      --soft-blue: #e9f0f8;
      --soft-red: #fde8e3;
      --success: #1e7a44;
      --warning: #9a5c00;
      --danger: #b33a2f;
      --shadow: 0 18px 45px rgba(31, 42, 35, 0.1);
      --radius: 8px;
      font-family: Arial, "Helvetica Neue", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-size: 16px;
      line-height: 1.55;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: var(--radius);
      cursor: pointer;
      min-height: 42px;
      padding: 10px 14px;
      font-weight: 700;
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible {
      outline: 3px solid rgba(176, 79, 45, 0.28);
      outline-offset: 2px;
    }

    .app-shell {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px;
    }

    .app-header {
      background: linear-gradient(135deg, #ffffff 0%, #edf5f3 56%, #fff4df 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .header-kicker {
      color: var(--primary-dark);
      font-size: 0.92rem;
      font-weight: 700;
      margin: 0 0 6px;
      text-transform: uppercase;
    }

    h1 {
      color: #143b38;
      font-size: 2rem;
      line-height: 1.18;
      margin: 0 0 14px;
    }

    .header-summary {
      color: var(--muted);
      margin: 0;
      max-width: 760px;
    }

    .meta-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      margin-top: 20px;
    }

    .meta-item {
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px 12px;
    }

    .meta-label {
      color: var(--muted);
      display: block;
      font-size: 0.78rem;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .meta-value {
      color: var(--ink);
      font-weight: 800;
    }

    .student-info,
    .lesson-nav,
    .part-panel,
    .result-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 8px 24px rgba(31, 42, 35, 0.06);
      margin-top: 18px;
    }

    .student-info {
      padding: 20px;
    }

    .section-title {
      align-items: center;
      display: flex;
      gap: 10px;
      margin: 0 0 14px;
    }

    .section-title::before {
      background: var(--accent);
      border-radius: 999px;
      content: "";
      display: inline-block;
      height: 12px;
      width: 12px;
    }

    h2,
    h3,
    h4 {
      line-height: 1.25;
    }

    h2 {
      color: #143b38;
      font-size: 1.45rem;
    }

    h3 {
      color: #214f4c;
      font-size: 1.12rem;
      margin: 22px 0 10px;
    }

    h4 {
      font-size: 1rem;
      margin: 0 0 10px;
    }

    .form-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    label {
      color: #293a35;
      display: block;
      font-weight: 700;
    }

    .field-label {
      margin-bottom: 6px;
    }

    input[type="text"],
    select,
    textarea {
      background: #fffefa;
      border: 1px solid #cfd7d0;
      border-radius: var(--radius);
      color: var(--ink);
      min-height: 42px;
      padding: 10px 12px;
      width: 100%;
    }

    textarea {
      min-height: 82px;
      resize: vertical;
    }

    textarea::placeholder {
      color: #60706b;
      opacity: 0.76;
    }

    textarea:focus::placeholder {
      opacity: 0.55;
    }

    .lesson-nav {
      display: flex;
      gap: 8px;
      padding: 10px;
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .tab-button {
      background: transparent;
      color: var(--primary-dark);
      flex: 1;
      min-width: 0;
    }

    .tab-button[aria-selected="true"] {
      background: var(--primary);
      color: #ffffff;
    }

    .part-panel {
      display: none;
      padding: 24px;
    }

    .part-panel.active {
      display: block;
    }

    .lead-box,
    .note-box,
    .mind-map,
    .score-summary {
      border-radius: var(--radius);
      padding: 16px;
    }

    .lead-box {
      background: var(--soft-green);
      border-left: 5px solid var(--primary);
      margin-bottom: 18px;
    }

    .note-box {
      background: var(--soft-amber);
      border-left: 5px solid #d1921e;
      margin: 16px 0;
    }

    .content-grid {
      display: grid;
      gap: 16px;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    }

    .content-block {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
    }

    .content-block ul,
    .content-block ol,
    .question-card ul,
    .question-card ol {
      padding-left: 22px;
    }

    .content-block li,
    .question-card li {
      margin: 7px 0;
    }

    .symbol-table,
    .score-table {
      border-collapse: collapse;
      margin: 12px 0 18px;
      width: 100%;
    }

    .symbol-table th,
    .symbol-table td,
    .score-table th,
    .score-table td {
      border: 1px solid var(--line);
      padding: 10px 12px;
      vertical-align: middle;
    }

    .symbol-table th,
    .score-table th {
      background: #edf5f3;
      color: #173f3c;
      text-align: left;
    }

    .score-table td:last-child,
    .score-table th:last-child {
      text-align: center;
      width: 100px;
    }

    code,
    .math-text {
      background: #f2f5f3;
      border-radius: 6px;
      color: #132f2d;
      display: inline-block;
      font-family: "Courier New", monospace;
      padding: 2px 6px;
    }

    .example-steps {
      background: var(--soft-blue);
      border-radius: var(--radius);
      padding: 14px 18px;
    }

    .mind-map {
      background: #fcfbf7;
      border: 1px solid var(--line);
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin: 12px 0 18px;
    }

    .mind-map span {
      background: #ffffff;
      border: 1px solid #d9ded7;
      border-radius: var(--radius);
      color: #253530;
      font-weight: 700;
      padding: 10px;
      text-align: center;
    }

    .question-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      margin: 14px 0;
      padding: 16px;
    }

    .question-card:nth-of-type(odd) {
      background: #ffffff;
    }

    .question-card:nth-of-type(even) {
      background: #fbfcfa;
    }

    .question-head {
      align-items: flex-start;
      display: flex;
      gap: 12px;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .question-title {
      color: #183d3a;
      font-weight: 800;
      margin: 0;
    }

    .point-badge {
      background: #f3e5cf;
      border-radius: 999px;
      color: #734214;
      flex: 0 0 auto;
      font-size: 0.85rem;
      font-weight: 800;
      padding: 4px 10px;
    }

    .choice-list {
      display: grid;
      gap: 8px;
      margin: 12px 0;
    }

    .choice-list label,
    .checkbox-grid label {
      align-items: center;
      background: #fffefa;
      border: 1px solid #d9ded7;
      border-radius: var(--radius);
      display: flex;
      gap: 10px;
      padding: 10px 12px;
    }

    .choice-list input,
    .checkbox-grid input {
      flex: 0 0 auto;
      height: 18px;
      width: 18px;
    }

    .inline-answer {
      align-items: center;
      display: grid;
      gap: 10px;
      grid-template-columns: minmax(160px, 1fr) auto;
      margin-top: 12px;
    }

    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .primary-action {
      background: var(--primary);
      color: #ffffff;
    }

    .primary-action:hover {
      background: var(--primary-dark);
    }

    .secondary-action {
      background: #e8ece9;
      color: #243632;
    }

    .secondary-action:hover {
      background: #d8ded9;
    }

    .feedback-box {
      border-radius: var(--radius);
      display: none;
      margin-top: 12px;
      padding: 12px;
    }

    .feedback-box.show {
      display: block;
    }

    .feedback-box.correct {
      background: #e4f4e9;
      border-left: 5px solid var(--success);
      color: #15482b;
    }

    .feedback-box.partial {
      background: #fff2d7;
      border-left: 5px solid var(--warning);
      color: #5e3a00;
    }

    .feedback-box.incorrect {
      background: var(--soft-red);
      border-left: 5px solid var(--danger);
      color: #6b231d;
    }

    .hint {
      color: var(--muted);
      font-size: 0.94rem;
      margin-top: 8px;
    }

    .checkbox-grid {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      margin-top: 12px;
    }

    .answer-key {
      background: #f8faf8;
      border: 1px dashed #c7d1ca;
      border-radius: var(--radius);
      color: #31413c;
      margin-top: 12px;
      padding: 10px 12px;
    }

    details.answer-key summary {
      cursor: pointer;
      font-weight: 800;
    }

    .test-toolbar {
      align-items: center;
      background: #f8faf8;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      margin: 16px 0;
      padding: 14px;
    }

    .timer {
      color: #29413b;
      font-weight: 800;
    }

    .result-card {
      display: none;
      padding: 22px;
    }

    .result-card.show {
      display: block;
    }

    .score-summary {
      background: #e9f0f8;
      border-left: 5px solid #456d9e;
      margin-top: 12px;
    }

    .result-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin-top: 14px;
    }

    .result-metric {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
    }

    .result-metric span {
      color: var(--muted);
      display: block;
      font-size: 0.82rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .result-metric strong {
      color: #183d3a;
      font-size: 1.25rem;
    }

    .footer-note {
      color: var(--muted);
      margin: 18px 0 0;
      text-align: center;
    }

    .symbol-toggle {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 10;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: var(--primary);
      color: #ffffff;
      box-shadow: 0 14px 30px rgba(31, 42, 35, 0.22);
      font-size: 1.35rem;
      padding: 0;
    }

    .symbol-panel {
      position: fixed;
      right: 18px;
      bottom: 84px;
      z-index: 11;
      width: min(330px, calc(100vw - 28px));
      display: none;
      border: 1px solid #bfd0c8;
      border-radius: var(--radius);
      background: #ffffff;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .symbol-panel.open {
      display: block;
    }

    .symbol-panel h2 {
      font-size: 1rem;
      margin: 0 0 10px;
    }

    .symbol-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .symbol-grid button {
      background: #f8faf8;
      border: 1px solid var(--line);
      min-height: 38px;
      padding: 6px;
    }

    @media (max-width: 820px) {
      .app-shell {
        padding: 14px;
      }

      .app-header,
      .part-panel,
      .student-info,
      .result-card {
        padding: 18px;
      }

      h1 {
        font-size: 1.55rem;
      }

      .meta-grid,
      .form-grid,
      .content-grid,
      .mind-map,
      .result-grid {
        grid-template-columns: 1fr;
      }

      .lesson-nav {
        overflow-x: auto;
        position: static;
      }

      .tab-button {
        flex: 0 0 180px;
      }

      .inline-answer {
        grid-template-columns: 1fr;
      }

      .checkbox-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media print {
      body {
        background: #ffffff;
      }

      .app-shell {
        max-width: none;
        padding: 0;
      }

      .lesson-nav,
      .action-row,
      button,
      .symbol-toggle,
      .symbol-panel {
        display: none !important;
      }

      .app-header,
      .student-info,
      .part-panel,
      .question-card,
      .result-card {
        box-shadow: none;
      }

      .part-panel,
      .part-panel.active,
      .result-card.show,
      .result-card.has-result {
        display: block;
      }

      .question-card,
      .content-block,
      .result-card {
        break-inside: avoid;
      }
    }
  </style>
</head>
<body data-lesson-id="{{BODY_LESSON_ID}}" data-timer-minutes="{{TIMER_MINUTES}}" data-total-points="{{TOTAL_POINTS}}">
  <main id="app" class="app-shell">
{{HEADER}}
{{PART_A}}
{{PART_B}}
{{PART_C}}
    <section id="result" class="result-card" aria-labelledby="result-title">
      <h2 id="result-title" class="section-title">Kết quả sau khi nộp bài</h2>
      <div id="result-content">
        <p>Em hãy hoàn thành phần kiểm tra rồi bấm nộp bài để xem kết quả.</p>
      </div>
      <div class="action-row">
        <button class="secondary-action" type="button" data-tab-jump="part-c">Quay lại bài kiểm tra</button>
        <button class="primary-action" type="button" id="print-result">In kết quả</button>
      </div>
    </section>
{{FOOTER_NOTE}}
  </main>

  <button class="symbol-toggle" type="button" aria-label="Mở bảng kí hiệu" title="Bảng kí hiệu" id="symbol-toggle">∑</button>
  <aside class="symbol-panel" id="symbol-panel" aria-label="Bảng kí hiệu toán học">
    <h2>Bảng kí hiệu</h2>
    <div class="symbol-grid" id="symbol-grid"></div>
  </aside>

  <script>
    const STORAGE_KEY = "{{STORAGE_KEY}}";
    const TEST_TOTAL_POINTS = Number(document.body.dataset.totalPoints || 10);
    const TIMER_TOTAL_SECONDS = Number(document.body.dataset.timerMinutes || 15) * 60;
    const savedState = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
    const mathSymbols = ["ℚ", "ℤ", "ℕ", "∈", "∉", "≠", "<", ">", "≤", "≥", "=", "+", "-", "·", ":", "(", ")", "{ }", ";", "a/b", "-a/b", "m n/a", "↵"];
    let timerSeconds = TIMER_TOTAL_SECONDS;
    let timerId = null;
    let activeField = null;

    function splitCsv(value) {
      return String(value || "")
        .split(",")
        .map((item) => item.trim())
        .filter(Boolean);
    }

    function normalizeText(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[{}]/g, "")
        .replace(/\s+/g, " ")
        .trim()
        .toLowerCase();
    }

    function normalizeToken(value) {
      return normalizeText(value).replace(/[.;,]/g, "").trim();
    }

    function splitItems(rawInside) {
      return rawInside
        .split(/[;,]/)
        .map(normalizeToken)
        .filter(Boolean);
    }

    function parseSetAnswer(value) {
      const text = String(value || "");
      const insideMatch = text.match(/\{([^}]*)\}/);
      const nameMatch = text.match(/^\s*([^=\s]+)\s*=/);
      const inside = insideMatch ? insideMatch[1] : text.replace(/^\s*[^=\s]+\s*=/, "");
      return {
        hasBraces: Boolean(insideMatch),
        name: nameMatch ? nameMatch[1] : "",
        items: splitItems(inside),
      };
    }

    function sameSet(actualItems, expectedItems) {
      const actual = new Set(actualItems);
      const expected = new Set(expectedItems.map(normalizeToken));
      if (actual.size !== expected.size) return false;
      for (const item of expected) {
        if (!actual.has(item)) return false;
      }
      return true;
    }

    function gradeSetAnswer(value, expectedName, expectedItems, maxPoints) {
      const parsed = parseSetAnswer(value);
      const expectedNameNormalized = normalizeToken(expectedName);
      const hasName = normalizeToken(parsed.name) === expectedNameNormalized;
      const hasItems = sameSet(parsed.items, expectedItems);
      const hasNotation = parsed.hasBraces && hasName;

      if (maxPoints === 0) {
        return {
          points: 0,
          status: hasItems && hasNotation ? "correct" : hasItems ? "partial" : "incorrect",
          hasItems,
          hasNotation,
        };
      }

      if (maxPoints === 1) {
        return {
          points: hasItems && hasNotation ? 1 : 0,
          status: hasItems && hasNotation ? "correct" : hasItems ? "partial" : "incorrect",
          hasItems,
          hasNotation,
        };
      }

      const notationPoints = 1;
      const itemPoints = Math.max(1, maxPoints - notationPoints);
      const points = (hasItems ? itemPoints : 0) + (hasNotation ? notationPoints : 0);
      return {
        points,
        status: points === maxPoints ? "correct" : points > 0 ? "partial" : "incorrect",
        hasItems,
        hasNotation,
      };
    }

    function parseJsonArray(value) {
      try {
        const parsed = JSON.parse(value || "[]");
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function gradeKeywordAnswer(value, keywords, minKeywords, maxPoints) {
      const normalizedAnswer = normalizeText(value);
      const required = keywords.map(normalizeText).filter(Boolean);
      if (!required.length || !normalizedAnswer) {
        return {
          points: 0,
          status: "incorrect",
          matched: [],
          missing: required,
        };
      }

      const matched = required.filter((keyword) => normalizedAnswer.includes(keyword));
      const minimum = Math.min(required.length, Number(minKeywords) || required.length);
      const isCorrect = matched.length >= minimum;
      const ratio = Math.min(1, matched.length / minimum);
      const points = isCorrect ? maxPoints : Math.round(maxPoints * ratio * 100) / 100;

      return {
        points,
        status: isCorrect ? "correct" : points > 0 ? "partial" : "incorrect",
        matched,
        missing: required.filter((keyword) => !matched.includes(keyword)),
      };
    }

    function gradeWrittenAnswer(card, value) {
      const maxPoints = Number(card.dataset.points || 0);
      const gradeType = card.dataset.gradeType || "set";

      if (gradeType === "keywords") {
        const keywords = parseJsonArray(card.dataset.keywords);
        return gradeKeywordAnswer(value, keywords, card.dataset.minKeywords, maxPoints);
      }

      if (gradeType === "manual") {
        return {
          points: 0,
          status: "manual",
        };
      }

      return gradeSetAnswer(value, card.dataset.name, splitCsv(card.dataset.items), maxPoints);
    }

    function showFeedback(id, status, message) {
      const box = document.getElementById(id);
      if (!box) return;
      box.className = `feedback-box show ${status}`;
      box.textContent = message;
    }

    function formatExpected(name, items) {
      return `${name} = {${items.join("; ")}}`;
    }

    function bindTabs() {
      const buttons = document.querySelectorAll(".tab-button");
      const panels = document.querySelectorAll(".part-panel, .result-card");

      function activate(tabId) {
        buttons.forEach((button) => {
          button.setAttribute("aria-selected", String(button.dataset.tab === tabId));
        });
        panels.forEach((panel) => {
          panel.classList.toggle("active", panel.id === tabId);
          if (panel.id === "result") {
            panel.classList.toggle("show", panel.id === tabId);
          }
        });
        const target = document.getElementById(tabId);
        if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      buttons.forEach((button) => {
        button.addEventListener("click", () => activate(button.dataset.tab));
      });

      document.querySelectorAll("[data-tab-jump]").forEach((button) => {
        button.addEventListener("click", () => activate(button.dataset.tabJump));
      });
    }

    function bindStorage() {
      document.querySelectorAll("[data-save]").forEach((field) => {
        const key = field.name || field.id;
        if (!key) return;

        if (field.type === "checkbox") {
          field.checked = savedState[field.id] === true;
        } else if (field.type === "radio") {
          field.checked = savedState[key] === field.value;
        } else if (Object.prototype.hasOwnProperty.call(savedState, key)) {
          field.value = savedState[key];
        }

        field.addEventListener("change", saveState);
        field.addEventListener("input", saveState);
      });
    }

    function saveState() {
      const state = {};
      document.querySelectorAll("[data-save]").forEach((field) => {
        const key = field.name || field.id;
        if (!key) return;
        if (field.type === "radio") {
          if (field.checked) state[key] = field.value;
        } else if (field.type === "checkbox") {
          state[field.id] = field.checked;
        } else {
          state[key] = field.value;
        }
      });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function bindPracticeChecks() {
      document.querySelectorAll("[data-check-symbol]").forEach((button) => {
        button.addEventListener("click", () => {
          const field = document.getElementById(button.dataset.checkSymbol);
          const correct = field && field.value === button.dataset.answer;
          showFeedback(
            button.dataset.feedback,
            correct ? "correct" : "incorrect",
            correct ? button.dataset.explain : "Hãy xem phần tử này có xuất hiện trong tập hợp không."
          );
        });
      });

      document.querySelectorAll("[data-check-symbols]").forEach((button) => {
        button.addEventListener("click", () => {
          const targets = splitCsv(button.dataset.targets);
          const expected = splitCsv(button.dataset.answers);
          const values = targets.map((id) => document.getElementById(id)?.value || "");
          const correctCount = values.filter((value, index) => value === expected[index]).length;
          const total = expected.length;
          const status = correctCount === total ? "correct" : correctCount > 0 ? "partial" : "incorrect";
          const defaultMessage = correctCount === total
            ? `Đúng cả ${total} câu.`
            : `Em đúng ${correctCount}/${total} câu. Hãy kiểm tra lại điều kiện của từng câu.`;
          const template = button.dataset.partialTemplate || defaultMessage;
          const message = correctCount === total
            ? button.dataset.successMessage || defaultMessage
            : template.replace("{correct}", correctCount).replace("{total}", total);
          showFeedback(button.dataset.feedback, status, message);
        });
      });

      document.querySelectorAll("[data-check-set]").forEach((button) => {
        button.addEventListener("click", () => {
          const input = document.getElementById(button.dataset.checkSet);
          const expectedItems = splitCsv(button.dataset.items);
          const result = gradeSetAnswer(input ? input.value : "", button.dataset.name, expectedItems, Number(button.dataset.points));
          const expected = formatExpected(button.dataset.name, expectedItems);
          const guideOnly = button.dataset.guideOnly === "true";
          let message = "";
          if (result.status === "correct") {
            message = `Đúng. Đáp án gợi ý: ${expected}.`;
          } else if (result.hasItems) {
            message = guideOnly
              ? button.dataset.partialGuide
              : `Em đã đúng phần tử, chỉ cần sửa cách trình bày: cần tên tập hợp ${button.dataset.name} và dấu ngoặc nhọn. Đáp án gợi ý: ${expected}.`;
          } else {
            message = guideOnly
              ? button.dataset.guide
              : `Em thử kiểm tra lại điều kiện của tập hợp nhé. Đáp án gợi ý: ${expected}.`;
          }
          showFeedback(button.dataset.feedback, result.status, message);
        });
      });

      document.querySelectorAll("[data-check-game]").forEach((button) => {
        button.addEventListener("click", () => {
          const expectedValues = splitCsv(button.dataset.answers);
          const expected = new Set(expectedValues);
          const group = document.getElementById(button.dataset.gameGroup);
          const selected = Array.from(group ? group.querySelectorAll("input:checked") : []).map((input) => input.value);
          const selectedSet = new Set(selected);
          const isCorrect = selectedSet.size === expected.size && Array.from(expected).every((value) => selectedSet.has(value));
          const correctSelected = selected.filter((value) => expected.has(value)).length;
          const answerText = expectedValues.join(", ");
          const defaultMessage = isCorrect
            ? `Đúng. Các lựa chọn đúng là: ${answerText}.`
            : `Em đã chọn đúng ${correctSelected}/${expected.size}. Hãy chọn đủ: ${answerText}.`;
          const partialTemplate = button.dataset.partialTemplate || defaultMessage;
          const message = isCorrect
            ? button.dataset.correctMessage || defaultMessage
            : partialTemplate
                .replace("{correct}", correctSelected)
                .replace("{total}", expected.size)
                .replace("{answers}", answerText);
          showFeedback(button.dataset.feedback, isCorrect ? "correct" : correctSelected > 0 ? "partial" : "incorrect", message);
        });
      });
    }

    function selectedQuizValue(name) {
      const checked = document.querySelector(`input[name="${name}"]:checked`);
      return checked ? checked.value : "";
    }

    function displayNumber(value) {
      return Number.isInteger(value) ? String(value) : value.toFixed(2).replace(/0+$/, "").replace(/\.$/, "");
    }

    function getComment(score, totalPoints) {
      const ratio = totalPoints > 0 ? score / totalPoints : 0;
      if (ratio >= 0.9) return "Em nắm bài rất tốt.";
      if (ratio >= 0.7) return "Em hiểu bài, cần luyện thêm một số dạng.";
      if (ratio >= 0.5) return "Em cần xem lại kiến thức trọng tâm và luyện thêm bài tương tự.";
      return "Em cần ôn lại kiến thức trọng tâm và làm lại phần luyện tập.";
    }

    function submitTest() {
      let multipleChoiceScore = 0;
      let multipleChoiceMax = 0;
      const quizDetails = [];

      document.querySelectorAll("[data-quiz]").forEach((card, index) => {
        const name = card.dataset.quiz;
        const expected = card.dataset.answer;
        const actual = selectedQuizValue(name);
        const points = Number(card.dataset.points || 1);
        const correct = actual === expected;
        multipleChoiceMax += points;
        if (correct) multipleChoiceScore += points;
        quizDetails.push(`Câu ${index + 1}: ${actual || "chưa chọn"} (${correct ? "đúng" : `đáp án ${expected}`})`);
      });

      let writtenScore = 0;
      let writtenMax = 0;
      const writtenDetails = [];
      document.querySelectorAll("[data-written]").forEach((card) => {
        const field = document.getElementById(card.dataset.written);
        const maxPoints = Number(card.dataset.points || 0);
        const result = gradeWrittenAnswer(card, field ? field.value : "");
        writtenScore += result.points;
        writtenMax += maxPoints;
        writtenDetails.push({
          label: card.querySelector(".question-title")?.textContent || "Tự luận",
          answer: field?.value || "Chưa làm",
          expected: card.dataset.expectedText || formatExpected(card.dataset.name, splitCsv(card.dataset.items)),
          points: result.points,
          maxPoints,
          status: result.status,
        });
      });

      const total = multipleChoiceScore + writtenScore;
      const totalMax = TEST_TOTAL_POINTS || multipleChoiceMax + writtenMax;
      const resultSection = document.getElementById("result");
      resultSection.classList.add("show", "has-result");

      const studentName = document.getElementById("student-name").value || "Chưa nhập";
      const studentClass = document.getElementById("student-class").value || "Chưa nhập";
      const studentCode = document.getElementById("student-code").value || document.body.dataset.lessonId;
      const writtenRows = writtenDetails.map((detail) => `
            <tr><td>${escapeHtml(detail.label)}</td><td>${formatWrittenDetail(detail)}</td><td>${displayNumber(detail.points)}/${displayNumber(detail.maxPoints)}</td></tr>
      `).join("");

      document.getElementById("result-content").innerHTML = `
        <div class="score-summary">
          <strong>Nhận xét:</strong> ${getComment(total, totalMax)}
        </div>
        <div class="result-grid">
          <div class="result-metric"><span>Học sinh</span><strong>${escapeHtml(studentName)}</strong></div>
          <div class="result-metric"><span>Lớp</span><strong>${escapeHtml(studentClass)}</strong></div>
          <div class="result-metric"><span>Mã bài</span><strong>${escapeHtml(studentCode)}</strong></div>
          <div class="result-metric"><span>Tổng điểm</span><strong>${displayNumber(total)}/${displayNumber(totalMax)}</strong></div>
        </div>
        <table class="score-table">
          <thead>
            <tr><th>Phần</th><th>Kết quả</th><th>Điểm</th></tr>
          </thead>
          <tbody>
            <tr><td>Trắc nghiệm</td><td>${quizDetails.map(escapeHtml).join("<br>") || "Không có"}</td><td>${displayNumber(multipleChoiceScore)}/${displayNumber(multipleChoiceMax)}</td></tr>
            ${writtenRows}
          </tbody>
        </table>
      `;

      document.querySelector('[data-tab="result"]').click();
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatWrittenDetail(detail) {
      const statusLabel = detail.status === "correct" ? "đúng" : detail.status === "partial" ? "đúng một phần" : detail.status === "manual" ? "giáo viên chấm" : "cần xem lại";
      return `${escapeHtml(statusLabel)}<br>Bài làm: ${escapeHtml(detail.answer)}<br>Đáp án gợi ý: ${escapeHtml(detail.expected)}`;
    }

    function updateTimerDisplay() {
      const minutes = String(Math.floor(timerSeconds / 60)).padStart(2, "0");
      const seconds = String(timerSeconds % 60).padStart(2, "0");
      document.getElementById("timer").textContent = `Thời gian: ${minutes}:${seconds}`;
    }

    function bindTimer() {
      const startButton = document.getElementById("start-timer");
      const resetButton = document.getElementById("reset-timer");
      if (!startButton || !resetButton) return;

      startButton.addEventListener("click", () => {
        if (timerId) return;
        timerId = window.setInterval(() => {
          timerSeconds = Math.max(0, timerSeconds - 1);
          updateTimerDisplay();
          if (timerSeconds === 0) {
            window.clearInterval(timerId);
            timerId = null;
            document.getElementById("timer").textContent = "Đã hết thời gian";
          }
        }, 1000);
      });

      resetButton.addEventListener("click", () => {
        if (timerId) window.clearInterval(timerId);
        timerId = null;
        timerSeconds = TIMER_TOTAL_SECONDS;
        updateTimerDisplay();
      });
    }

    function bindMathSymbols() {
      document.addEventListener("focusin", (event) => {
        if (event.target.matches("textarea, input[type='text']")) activeField = event.target;
      });

      document.getElementById("symbol-toggle").addEventListener("click", () => {
        document.getElementById("symbol-panel").classList.toggle("open");
      });

      const symbolGrid = document.getElementById("symbol-grid");
      mathSymbols.forEach((symbol) => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = symbol;
        button.addEventListener("click", () => insertSymbol(symbol));
        symbolGrid.appendChild(button);
      });
    }

    function insertSymbol(symbol) {
      if (!activeField) return;
      const value = symbol === "↵" ? "\n" : symbol;
      const start = activeField.selectionStart ?? activeField.value.length;
      const end = activeField.selectionEnd ?? activeField.value.length;
      activeField.value = activeField.value.slice(0, start) + value + activeField.value.slice(end);
      activeField.focus();
      activeField.selectionStart = activeField.selectionEnd = start + value.length;
      activeField.dispatchEvent(new Event("input", { bubbles: true }));
    }

    document.addEventListener("DOMContentLoaded", () => {
      bindStorage();
      bindTabs();
      bindPracticeChecks();
      bindTimer();
      bindMathSymbols();
      document.getElementById("submit-test")?.addEventListener("click", submitTest);
      document.getElementById("print-page")?.addEventListener("click", () => window.print());
      document.getElementById("print-result")?.addEventListener("click", () => window.print());
      updateTimerDisplay();
    });
  </script>
</body>
